services:

  api:
    build: .
    container_name: peopleflow-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    container_name: peopleflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: